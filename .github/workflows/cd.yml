name: CI/CD Pipeline
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cd_docker_project:latest .
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/cd_docker_project:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: cross-the-world/ssh-pipeline@master
        with:
          host: ${{ secrets.SERVER_IP }}
          user: root
          pass: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          connect_timeout: 10s
          last_ssh: |
            cd /root
            docker-compose pull
            docker-compose down
            docker-compose up -d