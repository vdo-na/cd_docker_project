name: CI/CD Pipeline
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cd_docker_project:latest .
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/cd_docker_project:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          # Эти настройки лечат зависания на новых Ubuntu
          command_timeout: 10m
          script: |
            cd /root
            # В новой Ubuntu команда часто пишется БЕЗ дефиса
            docker compose pull || docker-compose pull
            docker compose down || docker-compose down
            docker compose up -d || docker-compose up -d